<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/css/header.css" />
        <link rel="stylesheet" href="/css/product.css" />
        <title>Product</title>
    </head>
    <body>
        <header>
            <div class="header-top">
                <div class="store-logo-container">
                    <a href="#home">
                        <img src="/assets/store-logo.png" alt="store logo" />
                    </a>
                </div>
                <input type="text" class="search-bar" placeholder="Search" />
                <div class="login-cart-container">
                    <button onclick="window.location.href='/pages/auth/login.html'">Login</button>
                    <button onclick="window.location.href='/pages/shopping/cart.html'">Cart</button>
                </div>
            </div>
            <div class="header-bottom">
                <nav class="navbar">
                    <ul>
                        <li><a href="">Home</a></li>
                        <li><a href="">Mouse</a></li>
                        <li><a href="">Keyboard</a></li>
                        <li><a href="">Audio</a></li>
                        <li><a href="">Collectibles</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <div class="content-container">
            <div class="photo-gallery-container">
                <div class="display-photo-container">
                    <img
                        src="/assets/product-images/product-1.webp"
                        alt="display-photo"
                        class="main-photo"
                    />
                </div>
                <div class="other-photos">
                    <div class="other-photo-container">
                        <img
                            src="/assets/product-images/product-1.webp"
                            alt="other photo"
                            class="other-photo"
                        />
                    </div>
                </div>
            </div>
            <div class="product-desc-container">
                <h1 class="product-name">Product Name</h1>
                <h3 class="product-price">RM9999.99</h3>
                <p class="product-desc">Lorem ipsum</p>
                <div class="action-container">
                    <button class="buy-btn">Buy Now</button>
                    <button class="add-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </body>
</html>
